# config/discord.example.toml

[bot]
token_env = "DISCORD_BOT_TOKEN"    # env var name containing the bot token
guild_id = "YOUR_GUILD_ID"
setup_channel_id = ""              # channel for !init and config management (falls back to first agent channel)
status_channel_id = ""              # optional: broadcast channel for all agents
error_channel_id = ""               # optional: dedicated channel for errors/retries (falls back to status)
admin_users = []                    # Discord user IDs allowed to interact (empty = everyone)
plist_label = ""                    # launchd label for restart (e.g. "com.keel.serve")

[channels.noah]
channel_id = "YOUR_CHANNEL_ID"
agent_dir = "~/.ark/agents-home/noah"
# model = "sonnet"                    # optional: opus, sonnet, haiku (default: claude CLI default)

# Managed binaries — each entry adds a !<name>-update Discord command
# that runs the configured update_cmd.
#
# [managed_binaries.nark]
# update_cmd = ["nark", "update"]
#
# [managed_binaries.cubit]
# update_cmd = ["cubit", "update"]
