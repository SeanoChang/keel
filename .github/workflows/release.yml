name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build darwin/arm64 (Apple Silicon)
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: go build -ldflags="-s -w -X github.com/SeanoChang/keel/internal/update.Version=$VERSION" -o keel-darwin-arm64 .

      - name: Build linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: go build -ldflags="-s -w -X github.com/SeanoChang/keel/internal/update.Version=$VERSION" -o keel-linux-amd64 .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            keel-darwin-arm64
            keel-linux-amd64
          generate_release_notes: true
